<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renovacell · Sistema operativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Special+Gothic+Expanded+One&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#007311;--green-soft:#5FB873;--green-deep:#00590D;
    --grad-green:linear-gradient(135deg,#0a8f1f 0%,#006a10 100%);
    --carbon:#23271F;--hueso:#F9FAF8;--white:#fff;
    --ink:#0A0C08;--ink-2:#252921;--mid:#747D6C;--ink-3:#3D4238;--line:#E7E9E3;
    --warn:#B5730E;--warn-bg:#FBF1E0;--danger:#B23A33;--danger-bg:#FBECEA;
    --ok:#007311;--ok-bg:#E7F3E9;--blue:#2C6E8F;--blue-bg:#E7F0F4;
    --r-sm:10px;--r:14px;--r-lg:20px;--pill:999px;
    --sh-sm:0 1px 2px rgba(20,30,18,.07);
    --sh-md:0 4px 16px rgba(20,30,18,.07),0 1px 3px rgba(20,30,18,.05);
    --sh-lg:0 22px 48px -14px rgba(20,30,18,.22),0 4px 10px rgba(20,30,18,.05);
    --glow:0 10px 26px -6px rgba(0,115,17,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;font-feature-settings:'ss01','cv11';color:var(--ink);background:var(--hueso);-webkit-font-smoothing:antialiased}
  .serif{font-family:'Inter',sans-serif;letter-spacing:-.022em}.display{font-family:'Special Gothic Expanded One',sans-serif;font-weight:400}
  svg{display:block}
  ::selection{background:rgba(95,184,115,.3)}
  .app{display:grid;grid-template-columns:252px 1fr;height:100vh;overflow:hidden}
  .hidden{display:none!important}
  #menu{display:none;min-height:100vh;background:radial-gradient(1100px 500px at 50% -10%,rgba(95,184,115,.14),transparent 60%),var(--hueso);overflow:auto}
  #menu.show{display:block}
  .menu-wrap{max-width:1100px;margin:0 auto;padding:56px 32px 64px}
  .menu-head{text-align:center;margin-bottom:38px}
  .menu-brand{display:inline-flex;align-items:center;gap:11px;margin-bottom:24px}
  .mlw{width:42px;height:42px}.mlw img{width:42px;height:42px}
  .menu-brand .mbn{font-weight:700;font-size:16px;text-align:left}
  .menu-brand .mbs{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--green-deep);font-weight:600;margin-top:3px;text-align:left}
  .menu-title{font-size:40px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px;line-height:1.05}
  .menu-sub{font-size:15px;color:var(--ink-2);max-width:620px;margin:0 auto;line-height:1.55}
  .sysgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
  .syscard{text-align:left;font-family:inherit;cursor:pointer;background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--sh-md);transition:.18s;display:flex;flex-direction:column;animation:rise .5s both}
  .syscard:hover{transform:translateY(-4px);box-shadow:var(--sh-lg);border-color:var(--green-soft)}
  .sysic{width:46px;height:46px;border-radius:13px;background:var(--grad-green);color:#fff;display:grid;place-items:center;box-shadow:var(--glow);margin-bottom:16px}
  .sysic svg{width:23px;height:23px}
  .sysname{font-family:'Inter',serif;font-size:20px;font-weight:600;margin-bottom:6px}
  .sysdesc{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:18px;flex:1}
  .sysgo{font-size:12.5px;font-weight:600;color:var(--green-deep);display:flex;align-items:center;gap:6px}
  .sysgo svg{width:15px;height:15px}
  .menu-foot{text-align:center;margin-top:38px;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .backbtn{font-family:inherit;display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:var(--pill);padding:8px 15px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;box-shadow:var(--sh-sm);transition:.15s}
  .backbtn:hover{border-color:var(--green-soft);color:var(--green-deep)}
  .backbtn svg{width:15px;height:15px}
  .cursys{margin-left:13px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
  .side{position:relative;background:linear-gradient(180deg,#262B22,#181B14);color:#c3c9bd;display:flex;flex-direction:column;padding:22px 0;overflow:hidden}
  .side::before{content:"";position:absolute;top:-80px;left:-40px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(95,184,115,.22),transparent 70%)}
  .brand{display:flex;align-items:center;gap:11px;padding:2px 22px 20px}
  .brand .lw{position:relative;width:40px;height:40px;flex:none}
  .brand .lw::after{content:"";position:absolute;inset:-6px;border-radius:50%;background:radial-gradient(circle,rgba(95,184,115,.5),transparent 70%)}
  .brand img{width:40px;height:40px;position:relative;z-index:1}
  .brand .bn{font-weight:700;font-size:15.5px;color:#fff;line-height:1}
  .brand .bs{font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--green-soft);font-weight:600;margin-top:4px}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 13px;flex:1;overflow-y:auto}
  .nav .grp{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#717968;padding:14px 11px 8px;font-weight:600}
  .nav a{display:flex;align-items:center;gap:11px;padding:9.5px 11px;border-radius:11px;color:#bac0b4;font-size:13.5px;font-weight:500;cursor:pointer;transition:.16s}
  .nav a svg{width:17px;height:17px;opacity:.85;flex:none}
  .nav a:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav a.on{background:var(--grad-green);color:#fff;box-shadow:var(--glow)}
  .side-foot{margin:0 13px;padding:13px 11px 2px;border-top:1px solid rgba(255,255,255,.08)}
  .side-foot .comp{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9aa291;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .side-foot .comp svg{width:13px;height:13px;color:var(--green-soft)}
  .side-foot .op{font-size:11.5px;color:#717968;display:flex;align-items:center;gap:7px}
  .side-foot .op b{color:var(--green-soft);font-weight:600}
  .live{width:7px;height:7px;border-radius:50%;background:var(--green-soft);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,184,115,.5)}70%{box-shadow:0 0 0 7px rgba(95,184,115,0)}100%{box-shadow:0 0 0 0 rgba(95,184,115,0)}}
  .main{position:relative;display:flex;flex-direction:column;min-width:0;background:radial-gradient(1100px 460px at 100% -8%,rgba(95,184,115,.12),transparent 58%),var(--hueso)}
  .top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 30px;background:rgba(247,248,245,.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:9}
  .screen-title{font-size:23px;font-weight:500;letter-spacing:-.012em;line-height:1.1}
  .screen-sub{font-size:12.5px;color:var(--ink-2);margin-top:2px}
  .top-r{display:flex;align-items:center;gap:12px}
  .searchbox{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:var(--pill);padding:8px 14px;color:var(--ink-3);transition:.16s;width:150px}
  .searchbox:focus-within{border-color:var(--green-soft);box-shadow:0 0 0 3px rgba(95,184,115,.18)}
  .searchbox svg{width:15px;height:15px}.searchbox input{border:none;outline:none;background:none;font-family:inherit;font-size:13px;width:100%}
  .icobtn{width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-2);cursor:pointer;transition:.16s;position:relative}
  .icobtn:hover{color:var(--green-deep);border-color:var(--green-soft)}.icobtn svg{width:17px;height:17px}
  .icobtn .bdg{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid #fff}
  .switch{display:flex;align-items:center;gap:11px;padding:13px 30px 2px;overflow-x:auto}
  .switch-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);font-weight:700;flex:none}
  .seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:13px;padding:4px;box-shadow:var(--sh-sm);flex:none}
  .seg button{font-family:inherit;border:none;background:none;padding:9px 13px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.18s;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .seg button svg{width:14px;height:14px}.seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--grad-green);color:#fff;box-shadow:var(--glow)}
  .canvas{padding:22px 30px 60px;overflow:auto;flex:1}
  #content{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  .grid{display:grid;gap:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--sh-md);animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .eyebrow{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mid);font-weight:600;margin-bottom:16px}
  .eyebrow::before{content:"";width:18px;height:2px;border-radius:2px;background:var(--green)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:var(--pill);white-space:nowrap}
  .pill .d{width:6px;height:6px;border-radius:50%;background:currentColor}
  .p-ok{background:var(--ok-bg);color:var(--green-deep)}.p-warn{background:var(--warn-bg);color:var(--warn)}
  .p-dang{background:var(--danger-bg);color:var(--danger)}.p-neu{background:#EEF0EC;color:var(--ink-2)}.p-blue{background:var(--blue-bg);color:var(--blue)}
  table{width:100%;border-collapse:collapse}
  th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;text-align:left;padding:0 14px 12px;border-bottom:1px solid var(--line)}
  td{padding:13px 14px;border-bottom:1px solid var(--line);font-size:13.5px}
  tbody tr{transition:.14s}tbody tr:hover{background:var(--hueso)}tr:last-child td{border-bottom:none}
  .clickrow{cursor:pointer}
  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:600}
  .btn{font-family:inherit;border:none;background:var(--grad-green);color:#fff;font-weight:600;font-size:13.5px;padding:11px 16px;border-radius:11px;cursor:pointer;box-shadow:var(--glow);transition:.16s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn svg{width:16px;height:16px}.btn:hover{transform:translateY(-2px);filter:brightness(1.06)}.btn:active{transform:scale(.97)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);box-shadow:var(--sh-sm)}
  .btn.ghost:hover{border-color:var(--green-soft);color:var(--green-deep);filter:none}
  .btn.sm{padding:8px 13px;font-size:12.5px}
  .alert{display:flex;align-items:center;gap:15px;background:linear-gradient(180deg,#FCEEEC,#FBECEA);border:1px solid #ECCAC6;border-left:4px solid var(--danger);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;box-shadow:var(--sh-md);cursor:pointer;transition:.16s;animation:rise .5s both}
  .alert:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
  .alert .ico{width:38px;height:38px;border-radius:11px;background:var(--danger);color:#fff;display:grid;place-items:center;flex:none;box-shadow:0 6px 16px -4px rgba(178,58,51,.55)}
  .alert .ico svg{width:20px;height:20px}.alert b{color:var(--danger)}
  .alert .x{font-size:13.5px;color:#7a4b47;line-height:1.45}.alert .more{margin-left:auto;color:var(--danger);font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:5px;white-space:nowrap}.alert .more svg{width:15px;height:15px}
  .sigs{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));margin-bottom:18px}
  .sig .chip{width:38px;height:38px;border-radius:11px;background:var(--ok-bg);color:var(--green-deep);display:grid;place-items:center;margin-bottom:14px}.sig .chip svg{width:19px;height:19px}
  .sig.warn .chip{background:var(--warn-bg);color:var(--warn)}.sig.dang .chip{background:var(--danger-bg);color:var(--danger)}
  .sig .v{font-family:'Inter',serif;font-size:22px;font-weight:600;line-height:1.05}
  .sig.warn .v{color:var(--warn)}.sig.dang .v{color:var(--danger)}
  .sig .k{font-size:10.5px;letter-spacing:.04em;color:var(--ink-3);font-weight:600;margin:3px 0 9px;text-transform:uppercase}
  .sig .s{font-size:12px;color:var(--ink-2);line-height:1.45}
  .two{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .barrow{display:flex;align-items:center;gap:13px;margin-bottom:15px}
  .barrow .lab{width:120px;font-size:12.5px;flex:none}.barrow .track{flex:1;height:10px;background:#EEF0EC;border-radius:6px;overflow:hidden}
  .barrow .fill{height:100%;background:var(--grad-green);border-radius:6px;transform-origin:left;animation:grow .9s cubic-bezier(.2,.7,.3,1) both}
  .barrow .fill.warn{background:linear-gradient(135deg,#D89A2E,#B5730E)}.barrow .fill.dang{background:linear-gradient(135deg,#C9554D,#B23A33)}
  .barrow .amt{width:78px;text-align:right;font-size:12.5px;font-weight:600;flex:none}
  @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .lrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.lrow:last-child{border-bottom:none}
  .lrow .nm{font-size:13.5px;font-weight:500}.lrow .lt{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .step{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}.step:last-child{border-bottom:none}
  .step .n{width:27px;height:27px;border-radius:50%;background:var(--grad-green);color:#fff;font-weight:700;font-size:12.5px;display:grid;place-items:center;flex:none;box-shadow:var(--glow)}
  .step .t{font-size:13.5px;line-height:1.45}.step .t b{font-weight:600}.step .t span{color:var(--ink-2);font-size:12.5px}
  .op-wrap{grid-template-columns:minmax(0,1.7fr) minmax(290px,1fr);align-items:start}
  .pos-wrap{grid-template-columns:minmax(0,1.6fr) minmax(280px,1fr);align-items:start}
  .ltag{display:inline-block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:var(--pill)}
  .ltag.prof{background:#E7F0F4;color:var(--blue)}.ltag.cosm{background:#F3ECF7;color:#7A4E97}
  /* stock por lote */
  .lotebox{padding:13px 14px;border-bottom:1px solid var(--line)}.lotebox:last-child{border-bottom:none}
  .lotebox .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .lotebox .pn{font-size:13.5px;font-weight:600}
  .lote{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12.5px}
  .lote .lc{font-family:'JetBrains Mono',monospace;font-weight:600;background:var(--hueso);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:11.5px}
  .lote .lq{margin-left:auto;font-weight:600}
  .fefo{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--green-deep);background:var(--ok-bg);padding:3px 8px;border-radius:var(--pill)}
  .fefo svg{width:11px;height:11px}
  /* trazabilidad */
  .trace-in{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .trace-in .fld{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 14px;flex:1;min-width:200px}
  .trace-in .fld svg{width:16px;height:16px;color:var(--ink-3)}
  .trace-in .fld input{border:none;outline:none;font-family:inherit;font-size:13.5px;width:100%;background:none}
  .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .lchip{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--pill);border:1px solid var(--line);background:#fff;cursor:pointer;transition:.15s}
  .lchip:hover{border-color:var(--green-soft);color:var(--green-deep)}
  .lchip.on{background:var(--grad-green);color:#fff;border-color:transparent;box-shadow:var(--glow)}
  /* gate POS */
  .gate{display:flex;align-items:center;gap:14px;background:var(--ok-bg);border:1px solid #C9E4CF;border-radius:var(--r);padding:14px 18px;margin-bottom:18px}
  .gate .gi{width:38px;height:38px;border-radius:50%;background:var(--grad-green);color:#fff;display:grid;place-items:center;flex:none;box-shadow:var(--glow)}.gate .gi svg{width:19px;height:19px}
  .gate .gt{font-size:13.5px;font-weight:600;color:var(--green-deep)}.gate .gs{font-size:12px;color:var(--ink-2);margin-top:1px}
  .gate .chg{margin-left:auto}
  .posgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .poscard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;box-shadow:var(--sh-sm)}
  .poscard:hover{border-color:var(--green-soft);transform:translateY(-2px);box-shadow:var(--sh-md)}
  .poscard h5{font-size:13px;font-weight:600;margin:6px 0 4px;line-height:1.25}
  .poscard .lt{font-size:10.5px;color:var(--ink-3);margin-bottom:8px}
  .poscard .pr{font-family:'Inter';font-weight:600;font-size:15px}
  .ticket .titem{display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line)}
  .ticket .titem .tl{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-3)}
  .ticket .empty{color:var(--ink-3);font-size:13px;padding:14px 0;text-align:center}
  /* POS visual (speech de venta) */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:.16s;box-shadow:var(--sh-sm);display:flex;flex-direction:column}
  .pcard:hover{transform:translateY(-3px);box-shadow:var(--sh-lg);border-color:var(--green-soft)}
  .ptile{height:120px;display:grid;place-items:center;position:relative}
  .ptile.prof{background:radial-gradient(circle at 50% 32%,#E9F4EC,#CFE6D6)}
  .ptile.cosm{background:radial-gradient(circle at 50% 32%,#F5ECF8,#E7D7EE)}
  .ptile svg{width:40px;height:40px}
  .ptile.prof svg{color:var(--green)}
  .ptile.cosm svg{color:#7A4E97}
  .ptile .pbadge{position:absolute;top:10px;left:10px}
  .pcard .pb{padding:13px 15px 15px;display:flex;flex-direction:column;flex:1}
  .pcard h5{font-size:14.5px;font-weight:600;margin:0 0 auto;line-height:1.25}
  .pcard .pr{font-family:'Inter',serif;font-weight:600;font-size:18px;margin:10px 0}
  .pcard .addb{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--grad-green);color:#fff;font-weight:600;font-size:13px;padding:9px;border-radius:10px;box-shadow:var(--glow)}
  .pcard .addb svg{width:15px;height:15px}
  /* tracking de pedidos */
  .trk{display:flex;align-items:flex-start;margin:16px 0 4px}
  .tnode{display:flex;flex-direction:column;align-items:center;width:62px;flex:none}
  .tdot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#E3E6E0;color:#fff;border:2px solid #E3E6E0}
  .tdot svg{width:13px;height:13px}
  .tdot.done{background:var(--green);border-color:var(--green)}
  .tdot.now{background:#fff;border-color:var(--green);box-shadow:0 0 0 4px var(--ok-bg);animation:pulse 2s infinite}
  .tdot.now::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--green)}
  .tlab{font-size:10px;margin-top:6px;color:var(--ink-3);text-align:center;line-height:1.2}
  .tlab.done,.tlab.now{color:var(--ink);font-weight:500}
  .tseg{height:3px;background:#E3E6E0;flex:1;margin-top:11px;border-radius:2px}
  .tseg.done{background:var(--green)}
  .tket-total{display:flex;justify-content:space-between;align-items:center;padding-top:13px;font-weight:600}.tket-total b{font-family:'Inter';font-size:20px}
  /* recibo */
  .recibo{max-width:600px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-lg);overflow:hidden;animation:rise .5s both}
  .recibo .rhead{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 26px;border-bottom:2px solid var(--green)}
  .recibo .rbrand{display:flex;align-items:center;gap:11px}.recibo .rbrand img{width:42px;height:42px}
  .recibo .rbn{font-weight:700;font-size:16px}.recibo .rbs{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--green-deep);font-weight:600;margin-top:3px}
  .recibo .rdoc{text-align:right}.recibo .rdoc .t{font-family:'Inter';font-size:17px;font-weight:600}.recibo .rdoc .f{font-size:11.5px;color:var(--ink-3);margin-top:3px}
  .recibo .rmeta{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px 26px;border-bottom:1px solid var(--line)}
  .recibo .rmeta .k{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
  .recibo .rmeta .v{font-size:13px;margin-top:3px;font-weight:500}
  .recibo .rbody{padding:8px 26px 6px}
  .recibo table td,.recibo table th{padding:10px 0}
  .recibo .rfoot{display:flex;justify-content:space-between;align-items:center;padding:16px 26px;background:var(--hueso);border-top:1px solid var(--line)}
  .recibo .rfoot .note{font-size:11px;color:var(--ink-3);max-width:60%;line-height:1.4}
  .footnote{font-size:11.5px;color:var(--ink-3);margin-top:24px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;max-width:94ch}
  .footnote .d{width:5px;height:5px;border-radius:50%;background:var(--green-soft);margin-top:6px;flex:none}
  .overlay{position:fixed;inset:0;background:rgba(18,22,15,.5);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:50;animation:fade .2s;padding:20px}
  .modal{background:#fff;border-radius:18px;width:min(560px,94vw);max-height:88vh;overflow:auto;box-shadow:var(--sh-lg);animation:pop .25s cubic-bezier(.2,.7,.3,1)}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
  .mhead{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 24px 0}
  .mhead h3{font-family:'Inter';font-size:21px;font-weight:600}.mhead .ms{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .mclose{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink-2);flex:none}.mclose svg{width:16px;height:16px}
  .mbody{padding:18px 24px 24px}
  .dhead{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px 14px;border-bottom:1px solid var(--line)}
  .dbrand{display:flex;align-items:center;gap:11px;min-width:0}
  .dbrand img{width:34px;height:34px;object-fit:contain;flex:none}
  .dbrand .dbn{font-size:15px;font-weight:600;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
  .dbrand .dbs{font-size:10.5px;color:var(--ink-3);font-family:'JetBrains Mono',monospace;letter-spacing:.02em;margin-top:2px}
  .deck{position:relative;min-height:330px}
  .slide{display:none}.slide.on{display:block;animation:fade .25s}
  .sl-pad{padding:22px 26px 8px}
  .sl-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:11px}
  .sl-ph{font-size:12.5px;color:var(--ink-3);background:var(--bone-warm);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;line-height:1.5}
  .sl-stats{display:flex;gap:10px;flex-wrap:wrap}
  .sl-stat{background:var(--bone-warm);border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:12.5px;color:var(--ink)}
  .dnav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 22px 14px}
  .dbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink-2)}
  .dbtn svg{width:17px;height:17px}
  .dbtn:hover:not([disabled]){border-color:var(--green);color:var(--green)}
  .dbtn[disabled]{opacity:.32;cursor:default}
  .ddots{display:flex;gap:7px;align-items:center}
  .ddot{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:.18s}
  .ddot.on{background:var(--green);width:22px;border-radius:5px}
  .dcount{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.04em}
  .tl{position:relative;padding-left:24px;margin-top:6px}
  .tl::before{content:"";position:absolute;left:6px;top:6px;bottom:10px;width:2px;background:var(--line)}
  .tli{position:relative;padding:0 0 18px}
  .tli::before{content:"";position:absolute;left:-22px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid #fff;box-shadow:0 0 0 2px var(--ok-bg)}
  .tli.bad::before{background:var(--danger);box-shadow:0 0 0 2px var(--danger-bg);animation:pulse 2s infinite}
  .tli .dt{font-size:11px;color:var(--ink-3);font-weight:600}.tli .tt{font-size:13.5px;font-weight:500;margin-top:1px}.tli.bad .tt{color:var(--danger);font-weight:600}
  .sysnote{background:var(--ok-bg);border:1px solid #C9E4CF;border-radius:12px;padding:14px 16px;font-size:13px;color:var(--green-deep);line-height:1.45;margin-top:8px;display:flex;gap:10px}.sysnote svg{width:18px;height:18px;flex:none;margin-top:1px}
  .coitem{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .cototal{display:flex;justify-content:space-between;align-items:center;padding-top:14px;font-size:15px;font-weight:600}.cototal b{font-family:'Inter';font-size:22px}
  .success{text-align:center;padding:14px 6px}
  .success .ck{width:58px;height:58px;border-radius:50%;background:var(--grad-green);color:#fff;display:grid;place-items:center;margin:0 auto 14px;box-shadow:var(--glow)}.success .ck svg{width:28px;height:28px}
  .success h3{font-family:'Inter';font-size:21px;font-weight:600}.success p{font-size:13.5px;color:var(--ink-2);margin-top:7px;line-height:1.5}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--carbon);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--sh-lg);opacity:0;transition:.25s;z-index:60;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast svg{width:16px;height:16px;color:var(--green-soft)}
  .lp-hero{position:relative;background:linear-gradient(160deg,#1d2a1f,#0f160f);color:#e8ece6;padding:52px 48px 56px;overflow:hidden}
  .lp-hero::before{content:"";position:absolute;top:-110px;right:-70px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(95,184,115,.26),transparent 70%)}
  .lp-inner{position:relative;z-index:1;max-width:540px}
  .lp-bot{position:absolute;right:30px;bottom:30px;width:298px;background:#fff;color:var(--ink);border-radius:16px;box-shadow:var(--sh-lg);padding:14px;z-index:2}
  .lp-cells{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));border-top:1px solid var(--line)}
  .lp-cell{padding:17px 20px;border-right:1px solid var(--line)}
  .lp-cell:last-child{border-right:none}
  .lp-cell .t{font-size:13px;font-weight:600;margin-bottom:3px}
  .lp-cell .s{font-size:11.5px;color:var(--ink-2);line-height:1.4}
  @media (max-width:1180px){.lp-bot{position:static;width:auto;margin-top:26px}}
  .hamb{display:none;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--line);background:#fff;border-radius:11px;cursor:pointer;flex:none;color:var(--ink);padding:0}
  .hamb svg{width:20px;height:20px}
  #drawerOverlay{display:none}
  @media (max-width:900px){
    .app{display:block;height:auto;min-height:100vh;overflow:visible}
    .side{position:fixed;top:0;left:0;height:100vh;height:100dvh;width:264px;max-width:82vw;flex-direction:column;align-items:stretch;overflow-y:auto;padding:18px 0 14px;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:60;box-shadow:18px 0 50px rgba(0,0,0,.45)}
    body.drawer-open .side{transform:translateX(0)}
    #drawerOverlay{display:block;position:fixed;inset:0;background:rgba(12,20,15,.5);z-index:55;opacity:0;visibility:hidden;transition:opacity .26s,visibility .26s}
    body.drawer-open #drawerOverlay{opacity:1;visibility:visible}
    .hamb{display:inline-flex}
    .top{padding:12px 14px;justify-content:flex-start}
    .top-r{margin-left:auto}
    .canvas{padding:18px 16px 56px}
    .switch{padding:13px 16px 2px}
    .searchbox{display:none}
    .op-wrap,.pos-wrap{grid-template-columns:1fr}
    .screen-title{font-size:18px}
    .menu-wrap{padding:30px 18px 56px}
    .menu-head{margin-bottom:24px}
    .menu-title{font-size:29px}
    .syscard{padding:18px}
    .card{padding:16px}
    .lp-hero{padding:34px 20px}
    .lp-cell{border-right:none;border-bottom:1px solid var(--line)}
  }
</style>
</head>

          '<div class="lrow"><div><div class="nm">Estatus del pedido</div><div class="lt">dónde va y su guía</div></div></div>'+

  var ROLES={

    almacen:{lbl:'Almacén',ic:'box',grp:'Almacén · Alberto',def:'stock',
      nav:[['Existencias','box','stock'],['Surtido (FEFO)','layers','surtido'],['Caducidades','clock','caduc'],['Entradas','download','entradas']]},
    empaque:{lbl:'Empaque',ic:'pkg',grp:'Empaque · Alberto',def:'cola',
      nav:[['Por empacar','pkg','cola'],['Guías','truck','guia'],['Recibo de entrega','receipt','recibo']]},
    pos:{lbl:'Punto de Venta',ic:'store',grp:'Punto de venta · Ventas',def:'caja',
      nav:[['Caja','store','caja'],['Ventas del evento','grid','vev']]},
    portal:{lbl:'Portal del Doctor',ic:'bag',grp:'Portal del Doctor',def:'catalogo',

  var state={view:'menu',role:'administracion',screen:'tablero',linea:'todas'};
  var cart=[], ticket=[];
  function ticketTotal(){var t=0;ticket.forEach(function(x){var v=parseFloat(x.split('|')[1].replace(/,/g,''));if(!isNaN(v))t+=v;});return t.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

  var DESC={landing:'Página pública de ventas + agente de IA que capta doctores',administracion:'Dinero, riesgo y cumplimiento — la vista de dirección y de Claudia',almacen:'Existencias por lote y surtido FEFO — Alberto',empaque:'Guías rastreables y recibo de trazabilidad — Alberto',pos:'Catálogo visual para vender al visitar doctores y en expos',portal:'Donde el doctor pide, paga, rastrea y lo asiste la IA'};
  function renderMenu(){document.getElementById('menu').innerHTML='<div class="menu-wrap"><div class="menu-head"><div class="menu-brand"><span class="mlw"><img src="'+LOGO+'" alt="Renovacell"></span><div><div class="mbn">Renovacell</div><div class="mbs">Sistema operativo</div></div></div><h1 class="serif menu-title">Menú de sistemas</h1></div><div class="sysgrid">'+Object.keys(ROLES).map(function(k){var r=ROLES[k];return '<button class="syscard" data-enter="'+k+'"><div class="sysic">'+svg(r.ic)+'</div><div class="sysname">'+r.lbl+'</div><div class="sysdesc">'+(DESC[k]||'')+'</div><div class="sysgo">Entrar al sistema '+svg('arrow')+'</div></button>';}).join('')+'</div><div class="menu-foot">Operado por STRYV</div></div>';paint(document.getElementById('menu'));}
  function renderBack(){document.getElementById('switch').innerHTML='<button class="backbtn" data-back>'+svg('arrowl')+' Volver al menú de sistemas</button><span class="cursys">'+ROLES[state.role].lbl+'</span>';paint(document.getElementById('switch'));}
  function renderNav(){var r=ROLES[state.role];document.getElementById('nav').innerHTML='<div class="grp">'+r.grp+'</div>'+r.nav.map(function(it){return '<a class="'+(it[2]===state.screen?'on':'')+'" data-screen="'+it[2]+'">'+svg(it[1])+it[0]+'</a>';}).join('');paint(document.getElementById('nav'));}
  function render(){var sc=SCREENS[state.screen];if(!sc){state.screen=ROLES[state.role].def;sc=SCREENS[state.screen];}document.getElementById('title').textContent=sc.t;document.getElementById('sub').textContent=sc.s;var c=document.getElementById('content');c.innerHTML=sc.r(state.role);paint(c);c.style.animation='none';void c.offsetWidth;c.style.animation='';renderNav();renderBack();}
  function enterSystem(role){state.view='system';state.role=role;state.screen=ROLES[role].def;document.getElementById('menu').classList.remove('show');document.getElementById('app').classList.remove('hidden');render();window.scrollTo(0,0);}
  function backToMenu(){state.view='menu';document.getElementById('app').classList.add('hidden');document.getElementById('menu').classList.add('show');renderMenu();window.scrollTo(0,0);}
  function setScreen(s){state.screen=s;render();}

  function overlay(html){var o=document.createElement('div');o.className='overlay';o.dataset.ov=1;o.innerHTML='<div class="modal">'+html+'</div>';document.body.appendChild(o);paint(o);o.addEventListener('click',function(e){if(e.target===o)closeOv();});}
  function closeOv(){var o=document.querySelector('[data-ov]');if(o)o.remove();}
  var _deckI=0;
  function deckSet(i){var o=document.querySelector('[data-ov]');if(!o)return;var s=o.querySelectorAll('.slide');if(!s.length)return;i=Math.max(0,Math.min(s.length-1,i));_deckI=i;s.forEach(function(el,k){el.classList.toggle('on',k===i);});o.querySelectorAll('.ddot').forEach(function(el,k){el.classList.toggle('on',k===i);});var c=o.querySelector('.dcount');if(c)c.textContent=(i+1)+' / '+s.length;var pv=o.querySelector('[data-dprev]'),nx=o.querySelector('[data-dnext]');if(pv)pv.disabled=(i===0);if(nx)nx.disabled=(i===s.length-1);}
  function tli(dt,tt,bad){return '<div class="tli '+(bad?'bad':'')+'"><div class="dt">'+dt+'</div><div class="tt">'+tt+'</div></div>';}
  function openExped(){overlay('<div class="mhead"><div><h3>Expedición S-12840</h3><div class="ms">Estafeta · destino: doctor (muestra)</div></div><button class="mclose" data-close>'+svg('x')+'</button></div><div class="mbody"><div class="tl">'+tli('22/09/2025','Pedido creado',0)+tli('23/09/2025','Surtido · lote SAC-21',0)+tli('24/09/2025','Guía generada · Estafeta',0)+tli('25/09/2025','Entregada a paquetería',0)+tli('Desde 25/09/2025','Sin movimiento · más de 8 meses detenida',1)+'</div><div style="display:flex;gap:9px;margin-top:16px"><button class="btn" style="flex:1" data-demo="Aviso enviado al doctor (demo)">Avisar al doctor</button><button class="btn ghost" style="flex:1" data-demo="Paquetería reasignada (demo)">Reasignar paquetería</button></div><div class="footnote" style="margin-top:16px"><span class="d"></span> La detención desde el 25/09/2025 es real (de su Odoo). La línea de tiempo intermedia es de muestra.</div></div>');}
  function openCheckout(){if(!cart.length)return;var counts={};cart.forEach(function(x){counts[x]=(counts[x]||0)+1;});var items=Object.keys(counts).map(function(k){var pa=k.split('|');return '<div class="coitem"><span>'+pa[0]+' <span style="color:var(--ink-3)">×'+counts[k]+'</span></span><span class="mono">'+(pa[1]==='—'?'a consultar':'$'+pa[1])+'</span></div>';}).join('');overlay('<div class="mhead"><div><h3>Checkout</h3><div class="ms">Pedido formal · pago al momento</div></div><button class="mclose" data-close>'+svg('x')+'</button></div><div class="mbody">'+items+'<div class="coitem" style="border:none;color:var(--ink-2);font-size:12.5px"><span>Pago por Stripe · factura (CFDI) opcional, solo si la pides</span><span></span></div><div class="cototal"><span>Total</span><b>según tu precio</b></div><button class="btn" style="width:100%;margin-top:18px" data-confirm>Pagar y confirmar '+svg('arrow')+'</button><div class="footnote" style="margin-top:14px"><span class="d"></span> Demostración del checkout que reemplaza el "solicitar cotización". Pago contra pedido por Stripe; la factura (CFDI) es opcional. Sin WhatsApp.</div></div>');}
  function confirmOrder(){cart=[];render();var o=document.querySelector('[data-ov] .modal');if(o){o.innerHTML='<div class="mbody"><div class="success"><div class="ck">'+svg('check')+'</div><h3>Pedido confirmado</h3><p>Cobro por Stripe. Si el doctor pide factura, se timbra el CFDI. Da seguimiento desde su portal — sin un solo mensaje de WhatsApp.</p><button class="btn" style="margin-top:18px" data-close>Listo</button></div></div>';paint(o);}}
  function cobrarPOS(){if(!ticket.length)return;ticket=[];render();toast('Cobrado por Stripe · inventario descontado · factura opcional (demo)');}
  function toast(msg){var t=document.createElement('div');t.className='toast';t.innerHTML=svg('check')+msg;document.body.appendChild(t);paint(t);requestAnimationFrame(function(){t.classList.add('show');});setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},300);},2100);}
  function fichaRow(k,v){return '<div style="display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px"><span style="color:var(--ink-3)">'+k+'</span><span style="font-weight:500;text-align:right">'+v+'</span></div>';}
  function ficha(name){
  var p=null;PROD.forEach(function(x){if(x.n===name)p=x;});if(!p)return;_deckI=0;
  var priceTxt=p.p==='—'?'A consultar':'$'+p.p;
  var lineLabel=p.linea==='prof'?'Professional Line':'Home Care Line';
  var cover='<div class="slide on">'+
    (p.img?'<div style="position:relative;height:228px;background:#fff"><img src="'+p.img+'" style="width:100%;height:100%;object-fit:cover;display:block"><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,12,8,0) 32%,rgba(10,12,8,.82))"></div><div style="position:absolute;top:16px;left:16px">'+lineTag(p.linea)+'</div><div style="position:absolute;left:22px;right:22px;bottom:18px;color:#fff"><div style="font-family:&#39;JetBrains Mono&#39;,monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;opacity:.92;margin-bottom:7px">'+p.cat+'</div><div class="display" style="font-size:30px;line-height:1.03">'+p.n+'</div></div></div>':'<div style="height:200px;background:var(--grad-green);position:relative;display:grid;place-items:center"><div style="position:absolute;top:16px;left:16px">'+lineTag(p.linea)+'</div><div class="display" style="font-size:28px;color:#fff;text-align:center;padding:0 24px">'+p.n+'</div></div>')+
    '<div style="padding:22px 26px 6px"><p style="font-size:15.5px;line-height:1.55;color:var(--ink-2);margin:0">'+(p.desc||'')+'</p><div style="margin-top:18px;display:flex;align-items:center;gap:8px;font-family:&#39;JetBrains Mono&#39;,monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--green)"><span style="font-size:13px">⌗</span> Tecnología S²RM® · '+lineLabel+'</div></div></div>';
  var s2='<div class="slide"><div class="sl-pad"><div class="sl-eyebrow">Qué es</div><p style="font-size:15.5px;line-height:1.62;color:var(--ink-2);margin:0 0 22px">'+(p.desc||'')+'</p><div class="sl-eyebrow">Beneficios clave</div><div class="sl-ph">Los beneficios y los claims clínicos se digitalizan desde su ficha actual — aquí va la lista con íconos.</div></div></div>';
  var statCells=p.cat.split('·').map(function(s){return s.trim();}).filter(Boolean).map(function(s){return '<div class="sl-stat"><b>'+s+'</b></div>';}).join('');
  var s3='<div class="slide"><div class="sl-pad"><div class="sl-eyebrow">La ciencia</div><div class="display" style="font-size:23px;color:var(--ink);margin-bottom:12px">Tecnología S²RM®</div><p style="font-size:14.5px;line-height:1.6;color:var(--ink-2);margin:0 0 18px">Sistema regenerativo basado en el medio de cultivo de células madre (S²RM®): un complejo multi-proteico con factores de crecimiento y citoquinas. Certificación CE y registro COFEPRIS.</p><div class="sl-stats">'+statCells+'</div><div class="sl-ph" style="margin-top:18px">Mecanismo de acción, estudios y bibliografía: por digitalizar de su ficha.</div></div></div>';
  var s4='<div class="slide"><div class="sl-pad"><div class="sl-eyebrow">Presentación y uso</div>'+fichaRow('Categoría',p.cat)+fichaRow('Modo de uso','Por digitalizar de su ficha')+fichaRow('Presentación / contenido','Por digitalizar de su ficha')+fichaRow('Conservación','Por digitalizar de su ficha')+fichaRow('Registro COFEPRIS','Por digitalizar de su ficha')+'</div></div>';
  var cta=state.role==='pos'?'<button class="btn" style="width:100%;margin-top:18px" data-pos="'+p.n+'|'+p.p+'|'+p.lotes[0][0]+'">'+svg('plus')+' Agregar a la venta</button>':'<button class="btn" style="width:100%;margin-top:18px" data-add="'+p.n+'|'+p.p+'">'+svg('plus')+' Agregar al pedido</button>';
  var s5='<div class="slide"><div class="sl-pad"><div class="sl-eyebrow">Acceso / pedido</div><div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px"><div class="display" style="font-size:34px;color:var(--green)">'+priceTxt+'</div>'+(p.p==='—'?'':'<span style="font-size:12px;color:var(--mid)">precio Home Care</span>')+'</div><div style="font-size:13.5px;line-height:1.6;color:var(--ink-2);margin:14px 0">Pedido por el <b>Portal del Doctor</b> · pago contra pedido por Stripe · factura CFDI opcional.</div>'+fichaRow('Lote disponible',p.lotes[0][0]+' · cad. '+p.lotes[0][1])+fichaRow('Acceso','Solo profesionales de la salud verificados')+cta+'</div></div>';
  var slides=[cover,s2,s3,s4,s5];
  var dots=slides.map(function(_x,i){return '<span class="ddot'+(i===0?' on':'')+'" data-ddot="'+i+'"></span>';}).join('');
  overlay('<div class="dhead"><div class="dbrand"><img src="'+LOGO+'" alt=""><div><div class="dbn">'+p.n+'</div><div class="dbs">Presentación de venta · '+lineLabel+'</div></div></div><div style="display:flex;gap:8px"><button class="mclose" data-demo="Presentación descargada en PDF (demo)" title="Descargar PDF">'+svg('download')+'</button><button class="mclose" data-close>'+svg('x')+'</button></div></div>'+
    '<div class="deck">'+slides.join('')+'</div>'+
    '<div class="dnav"><button class="dbtn" data-dprev disabled><span style="display:grid;place-items:center;transform:rotate(180deg)">'+svg('arrow')+'</span></button><div class="ddots">'+dots+'</div><div style="display:flex;align-items:center;gap:14px"><span class="dcount">1 / '+slides.length+'</span><button class="dbtn" data-dnext>'+svg('arrow')+'</button></div></div>'+
    '<div class="footnote" style="padding:0 24px 20px;margin:0"><span class="d"></span> Presentación de demostración. La estructura está lista; el contenido clínico se digitaliza desde sus PDF actuales. No inventamos datos clínicos.</div>');
}

  document.addEventListener('click',function(e){
    var en=e.target.closest('[data-enter]');if(en){enterSystem(en.dataset.enter);return;}
    if(e.target.closest('[data-back]')){backToMenu();return;}
    var nv=e.target.closest('.nav a[data-screen]');if(nv){setScreen(nv.dataset.screen);return;}
    var go=e.target.closest('[data-screen-go]');if(go){setScreen(go.dataset.screenGo);return;}
    var gt=e.target.closest('[data-goto]');if(gt){var gp=gt.dataset.goto.split('|');state.view='system';state.role=gp[0];state.screen=gp[1];document.getElementById('menu').classList.remove('show');document.getElementById('app').classList.remove('hidden');render();window.scrollTo(0,0);return;}
    var fi=e.target.closest('[data-ficha]');if(fi){ficha(fi.dataset.ficha);return;}
    if(e.target.closest('[data-dprev]')){deckSet(_deckI-1);return;}
    if(e.target.closest('[data-dnext]')){deckSet(_deckI+1);return;}
    var dd=e.target.closest('[data-ddot]');if(dd){deckSet(+dd.dataset.ddot);return;}
    if(e.target.closest('[data-open="exped"]')){openExped();return;}
    if(e.target.closest('[data-close]')){closeOv();return;}
    if(e.target.closest('[data-checkout]')){openCheckout();return;}
    if(e.target.closest('[data-confirm]')){confirmOrder();return;}
    if(e.target.closest('[data-cobrar]')){cobrarPOS();return;}
    if(e.target.closest('[data-poscancel]')){ticket=[];render();return;}
    var pos=e.target.closest('[data-pos]');if(pos){ticket.push(pos.dataset.pos);closeOv();render();toast('Agregado a la venta');return;}
    var add=e.target.closest('[data-add]');if(add){cart.push(add.dataset.add);closeOv();render();toast('Agregado al pedido');return;}
    var ln=e.target.closest('[data-linea]');if(ln){state.linea=ln.dataset.linea;render();return;}
    var dm=e.target.closest('[data-demo]');if(dm){toast(dm.dataset.demo);return;}
  });
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeOv();if(e.key==='ArrowRight')deckSet(_deckI+1);if(e.key==='ArrowLeft')deckSet(_deckI-1);});
  paint(document);renderMenu();
</script>

<script>
(function(){var b=document.body;document.addEventListener("click",function(e){if(e.target.closest("#menuBtn")){b.classList.add("drawer-open");return;}if(e.target.closest("#drawerOverlay")){b.classList.remove("drawer-open");return;}if(e.target.closest("#nav a")){b.classList.remove("drawer-open");}});window.addEventListener("resize",function(){if(window.innerWidth>900)b.classList.remove("drawer-open");});})();
</script>
